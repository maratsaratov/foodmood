version: "3.9"

services:
  # ─── PostgreSQL ───────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: edanastroenie_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: edanastroenie
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: your_postgres_password
    ports:
      - "7431:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d edanastroenie"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - app_net

  # ─── Flask backend ────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: edanastroenie_backend
    restart: unless-stopped
    environment:
      FLASK_ENV: ${FLASK_ENV:-production}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-jwt-in-production}
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/edanastroenie
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      MAIL_SERVER: ${MAIL_SERVER:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USE_TLS: ${MAIL_USE_TLS:-True}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app_net
    expose:
      - "5000"

  # ─── React frontend (nginx) ───────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: edanastroenie_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - app_net

volumes:
  postgres_data:

networks:
  app_net:
    driver: bridge
